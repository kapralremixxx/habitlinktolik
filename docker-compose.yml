version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: habitlink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habitlink_pass}
      POSTGRES_DB: habitlink
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://habitlink:${POSTGRES_PASSWORD:-habitlink_pass}@db:5432/habitlink?schema=public
    depends_on:
      - db
    ports:
      - '4000:4000'
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - '3001:3000'   # Next.js defaults to 3000 inside container
    restart: unless-stopped

volumes:
  db_data:
